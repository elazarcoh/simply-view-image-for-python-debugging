name: Extension Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install Yarn dependencies
        run: yarn install --immutable
      - name: Lint code
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    outputs:
      test-passed: ${{ steps.stats.outputs.passed }}
      test-failed: ${{ steps.stats.outputs.failed }}
      test-skipped: ${{ steps.stats.outputs.skipped }}
      test-total: ${{ steps.stats.outputs.total }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: tests/test-data/workspace/requirements.txt

      - name: Install Yarn dependencies
        run: yarn install --immutable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/test-data/workspace/requirements.txt

      - name: Build webview
        run: yarn build:webview

      - name: Build extension
        run: yarn build:extension

      - name: Run tests with xvfb
        env:
          CI: 'true'
          MOCHA_JUNIT: 'true'
          # Increase stability for headless testing
          DISPLAY: ':99.0'
        run: |
          mkdir -p test-results
          yarn test:compile
          xvfb-run -a --server-args="-screen 0 1920x1080x24" yarn extest setup-and-run './out/tests/ui-test/*.test.js' -y --install_dependencies 'ms-python.python' --storage test-resources --code_settings tests/vscode-test-settings.json
        # continue-on-error: true  # don't use it, so a proper error will show. instead, we use if: always() on the rest of the steps

      - name: Upload test results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: UI Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            out/tests/
            test-results/
            test-resources/settings/
            test-resources/*.json

      - name: Store UI test logs
        uses: actions/upload-artifact@v4
        if: failure() || cancelled()
        with:
          name: logs-ubuntu-latest
          path: |
            test-resources/settings/logs/*
            test-resources/*.log

      - name: Store UI Test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-ubuntu-latest
          path: |
            test-resources/screenshots/*.png
            test-resources/**/*.png

      - name: Extract test statistics
        id: stats
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse('test-results/junit.xml').getroot()
              # root is <testsuites> (aggregate) or <testsuite> — both carry totals at root level
              tests   = int(root.get('tests',   0))
              failures= int(root.get('failures', 0))
              errors  = int(root.get('errors',   0))
              skipped = int(root.get('skipped',  0))
              passed  = tests - failures - errors - skipped
          except Exception as e:
              print(f'Warning: could not parse junit.xml: {e}', file=sys.stderr)
              tests = failures = errors = skipped = passed = 0
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'passed={passed}\n')
              f.write(f'failed={failures + errors}\n')
              f.write(f'skipped={skipped}\n')
              f.write(f'total={tests}\n')
          EOF

  python-unit-test:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      test-passed: ${{ steps.stats.outputs.passed }}
      test-failed: ${{ steps.stats.outputs.failed }}
      test-skipped: ${{ steps.stats.outputs.skipped }}
      test-total: ${{ steps.stats.outputs.total }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('tests/test-data/workspace/requirements.txt', 'tests/unit/python/requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r tests/test-data/workspace/requirements.txt
          .venv/bin/pip install -r tests/unit/python/requirements.txt

      - name: Run Python unit tests
        run: |
          mkdir -p test-results
          .venv/bin/pytest tests/unit/python/ -v --junitxml=test-results/python-unit-junit.xml

      - name: Upload Python unit test results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python Unit Test Results
          path: test-results/python-unit-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Python unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-unit-test-results
          path: test-results/python-unit-junit.xml

      - name: Extract test statistics
        id: stats
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse('test-results/python-unit-junit.xml').getroot()
              # pytest wraps results in <testsuites> with stats on child <testsuite> elements
              if root.tag == 'testsuites':
                  tests = failures = errors = skipped = 0
                  for suite in root.findall('testsuite'):
                      tests    += int(suite.get('tests',    0))
                      failures += int(suite.get('failures', 0))
                      errors   += int(suite.get('errors',   0))
                      skipped  += int(suite.get('skipped',  0))
              else:
                  tests    = int(root.get('tests',    0))
                  failures = int(root.get('failures', 0))
                  errors   = int(root.get('errors',   0))
                  skipped  = int(root.get('skipped',  0))
              passed = tests - failures - errors - skipped
          except Exception as e:
              print(f'Warning: could not parse junit.xml: {e}', file=sys.stderr)
              tests = failures = errors = skipped = passed = 0
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'passed={passed}\n')
              f.write(f'failed={failures + errors}\n')
              f.write(f'skipped={skipped}\n')
              f.write(f'total={tests}\n')
          EOF

  ts-unit-test:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      test-passed: ${{ steps.stats.outputs.passed }}
      test-failed: ${{ steps.stats.outputs.failed }}
      test-skipped: ${{ steps.stats.outputs.skipped }}
      test-total: ${{ steps.stats.outputs.total }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install Yarn dependencies
        run: yarn install --immutable

      - name: Run TypeScript unit tests
        run: |
          mkdir -p test-results
          MOCHA_JUNIT=true yarn test:unit:ts

      - name: Upload TS unit test results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TypeScript Unit Test Results
          path: test-results/ts-unit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload TS unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-unit-test-results
          path: test-results/ts-unit.xml

      - name: Extract test statistics
        id: stats
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse('test-results/ts-unit.xml').getroot()
              if root.tag == 'testsuites':
                  tests = failures = errors = skipped = 0
                  for suite in root.findall('testsuite'):
                      tests    += int(suite.get('tests',    0))
                      failures += int(suite.get('failures', 0))
                      errors   += int(suite.get('errors',   0))
                      skipped  += int(suite.get('skipped',  0))
              else:
                  tests    = int(root.get('tests',    0))
                  failures = int(root.get('failures', 0))
                  errors   = int(root.get('errors',   0))
                  skipped  = int(root.get('skipped',  0))
              passed = tests - failures - errors - skipped
          except Exception as e:
              print(f'Warning: could not parse junit.xml: {e}', file=sys.stderr)
              tests = failures = errors = skipped = passed = 0
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'passed={passed}\n')
              f.write(f'failed={failures + errors}\n')
              f.write(f'skipped={skipped}\n')
              f.write(f'total={tests}\n')
          EOF

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build for production
        run: yarn build:prod

      - name: Package extension
        run: yarn package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: '*.vsix'

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Audit dependencies
        run: yarn audit --level moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          # Check package.json for any obvious security issues
          grep -i "password\|secret\|key\|token" package.json || \
            echo "No obvious secrets in package.json"

  check:
    if: always()
    runs-on: ubuntu-latest
    name: 🚦 Status Check
    needs: [test, python-unit-test, ts-unit-test, build, security]
    steps:
      - name: ℹ️ Test Matrix Result
        run: |
          echo "E2E test result = ${{ needs.test.result }}"
          echo "Python unit test result = ${{ needs.python-unit-test.result }}"
          echo "TS unit test result = ${{ needs.ts-unit-test.result }}"
          echo "Build result = ${{ needs.build.result }}"
          echo "Security result = ${{ needs.security.result }}"
      - name: ✅ Status Check - success
        if: >-
          ${{ needs.test.result == 'success' &&
              needs.python-unit-test.result == 'success' &&
              needs.ts-unit-test.result == 'success' &&
              needs.build.result == 'success' &&
              (needs.security.result == 'success' ||
               needs.security.result == 'skipped') }}
        run: |
          echo "All tests successfully completed!"
          exit 0
      - name: ❌ Status Check - failure
        if: >-
          ${{ needs.test.result != 'success' ||
              needs.python-unit-test.result != 'success' ||
              needs.ts-unit-test.result != 'success' ||
              needs.build.result != 'success' }}
        run: |
          echo "Status Check failed!"
          echo "E2E test result: ${{ needs.test.result }}"
          echo "Python unit test result: ${{ needs.python-unit-test.result }}"
          echo "TS unit test result: ${{ needs.ts-unit-test.result }}"
          echo "Build result: ${{ needs.build.result }}"
          echo "Security result: ${{ needs.security.result }}"
          exit 1

      - name: Post PR summary comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const e2ePassed  = '${{ needs.test.outputs.test-passed  }}' || '0';
            const e2eFailed  = '${{ needs.test.outputs.test-failed  }}' || '0';
            const e2eSkipped = '${{ needs.test.outputs.test-skipped }}' || '0';
            const e2eTotal   = '${{ needs.test.outputs.test-total   }}' || '0';

            const pyPassed  = '${{ needs.python-unit-test.outputs.test-passed  }}' || '0';
            const pyFailed  = '${{ needs.python-unit-test.outputs.test-failed  }}' || '0';
            const pySkipped = '${{ needs.python-unit-test.outputs.test-skipped }}' || '0';
            const pyTotal   = '${{ needs.python-unit-test.outputs.test-total   }}' || '0';

            const tsPassed  = '${{ needs.ts-unit-test.outputs.test-passed  }}' || '0';
            const tsFailed  = '${{ needs.ts-unit-test.outputs.test-failed  }}' || '0';
            const tsSkipped = '${{ needs.ts-unit-test.outputs.test-skipped }}' || '0';
            const tsTotal   = '${{ needs.ts-unit-test.outputs.test-total   }}' || '0';

            const testResult  = '${{ needs.test.result }}';
            const pyTestResult = '${{ needs.python-unit-test.result }}';
            const tsTestResult = '${{ needs.ts-unit-test.result }}';
            const buildResult = '${{ needs.build.result }}';
            const allGood = testResult === 'success' && pyTestResult === 'success' && tsTestResult === 'success' && buildResult === 'success';
            const icon = allGood ? '✅' : '❌';

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Fetch artifact list for direct download links
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifactLinks = artifacts
              .map(a => `[${a.name}](${runUrl}/artifacts/${a.id})`)
              .join(' &nbsp;·&nbsp; ');

            const body = [
              `<!-- ci-summary -->`,
              `## ${icon} CI Results`,
              ``,
              `### 🧪 Tests`,
              `| Suite | ✅ Passed | ❌ Failed | ⏭️ Skipped | 📊 Total |`,
              `|:------|:---------:|:---------:|:----------:|:--------:|`,
              `| E2E (UI) | ${e2ePassed} | ${e2eFailed} | ${e2eSkipped} | ${e2eTotal} |`,
              `| Python Unit | ${pyPassed} | ${pyFailed} | ${pySkipped} | ${pyTotal} |`,
              `| TS Unit | ${tsPassed} | ${tsFailed} | ${tsSkipped} | ${tsTotal} |`,
              ``,
              `### 📦 Artifacts`,
              artifactLinks || `_No artifacts found — [view run](${runUrl})_`,
              ``,
              `<sub>[→ Full run details](${runUrl})</sub>`,
            ].join('\n');

            // Create or update the sticky comment
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('<!-- ci-summary -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
